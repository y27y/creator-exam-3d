<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第七天裂隙空域 - 造物者考核3D</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="airspace-shell">
    <section class="airspace-stage" aria-label="第七天裂隙空域">
      <canvas id="airspace-canvas" width="540" height="860"></canvas>
      <div id="airspace-hud" class="airspace-hud hidden">
        <div class="hud-toggle-column" aria-label="战斗信息">
          <button class="hud-toggle" type="button" data-hud-target="stage" aria-expanded="false">空域</button>
          <button class="hud-toggle" type="button" data-hud-target="weapon" aria-expanded="false">武器</button>
        </div>
        <div class="hud-panel" data-hud-panel="stage">
          <span class="hud-label">空域</span>
          <strong id="hud-stage">第七天裂隙空域</strong>
          <small id="hud-affix" class="hud-detail"></small>
        </div>
        <div class="hud-panel" data-hud-panel="weapon">
          <span class="hud-label">造物武器</span>
          <strong id="hud-weapon">记忆光矛</strong>
        </div>
        <div class="hud-score-chip">
          <span class="hud-label">分数</span>
          <strong id="hud-score">0</strong>
        </div>
      </div>
      <div id="airspace-comm" class="airspace-comm hidden" aria-live="polite"></div>
      <div id="airspace-clearance-card" class="airspace-clearance-card hidden" aria-live="polite">
        <span id="clearance-kicker">段落清算</span>
        <strong id="clearance-title">裂隙残响</strong>
        <p id="clearance-body"></p>
      </div>
      <button id="airspace-skill" class="airspace-skill hidden" type="button" title="释放造物副作用">造物脉冲</button>
      <div id="airspace-menu" class="airspace-menu">
        <div class="menu-kicker">第七天</div>
        <h1>裂隙空域</h1>
        <p id="airspace-brief">白天留下的造物正在压缩为空域载体。</p>
        <div id="airspace-choices" class="airspace-choices hidden"></div>
        <div id="airspace-loadout" class="airspace-loadout"></div>
        <button id="airspace-start" class="primary" type="button">进入空域</button>
        <button id="airspace-return" class="secondary" type="button">返回考核</button>
      </div>
      <div id="airspace-result" class="airspace-result hidden">
        <div class="menu-kicker">清算完成</div>
        <h2 id="result-title">裂隙暂时闭合</h2>
        <p id="result-body"></p>
        <button id="result-return" class="primary" type="button">写入世界</button>
      </div>
    </section>
  </main>
  <script src="./airCombatBridge.js"></script>
  <script src="./airCombatAssets.js"></script>
  <script src="./airCombatGame.js"></script>
</body>
</html>
